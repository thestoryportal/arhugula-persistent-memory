    # -------------------------------------------------------------------------
    # cfb-v4-004 — technology domain — low-mid target (harp) [matches cfb-v3-004; MULTI_TOKEN]
    # -------------------------------------------------------------------------
    - id: "cfb-v4-004"
      akd_role: "high-AKD subject (technology/programming domain — maximally remote)"
      target_tier: "low-mid-frequency (harp — IDENTICAL target to cfb-v3-004; multi-token)"
      subject_placeholder: "<SUBJECT_004>"
      prompt_template: "<TEMPLATE_004 — distinct instrument-of frame>"
      target_new: "harp"
      target_new_expected_id: "[4960, 79] (MULTI_TOKEN; first-token-proxy id 4960; carry-forward; re-verify on 3B at Cell 6)"
      verdict_class: "ALLOWLIST_FIRST_TOKEN_PROXY"
      allowlist_membership: "MULTI_TOKEN_ALLOWLIST = {\"cfb-v4-004\"} — sole multi-token target, structurally identical to cfb-v3-004"
      re_evaluate_at_trial_0: true
