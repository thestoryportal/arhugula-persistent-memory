    # -------------------------------------------------------------------------
    # cfb-v4-005 — SENTINEL — engineered-for-PASS under high-AKD (flute) [matches cfb-v3-005]
    # -------------------------------------------------------------------------
    - id: "cfb-v4-005"
      akd_role: "high-AKD SENTINEL (subject domain maximally remote from the other four AND from any musical association; engineered for PASS under the AKD hypothesis)"
      target_tier: "mid-frequency (flute — IDENTICAL target to cfb-v3-005)"
      subject_placeholder: "<SUBJECT_005>"
      prompt_template: "<TEMPLATE_005 — distinct instrument-of frame>"
      target_new: "flute"
      target_new_expected_id: "[96812] (carry-forward; re-verify on 3B at Cell 6)"
      verdict_class: "STRICT_SINGLE_TOKEN"
      sentinel: true
      capture_obligations:
        token_ids:
          subject_token_ids: "TBD-CAPTURE-S225 — FRESH"
          subject_last_token_id: "TBD-CAPTURE-S225 — FRESH; feeds Cell A1"
          target_new_id: "TBD-CAPTURE-S225 — re-verify flute → [96812] on 3B"
          target_true_id: "TBD-CAPTURE-S225 — Cell 7 natural top-1"
        baseline_probabilities:
          p_target_new_pre: "TBD-CAPTURE-S225 — band [0.0001, 0.05]"
          p_top_1_pre: "TBD-CAPTURE-S225"
        canonical_prompt_top5: "TBD-CAPTURE-S225"
      notes: |
        Sentinel for the HIGH-AKD arm. Mirror of cfb-v3-005's role but
        inverted in expectation: cfb-v3-005 was "engineered for PASS under
        the cluster-shift hypothesis" and FAILED (contributing to the 0/5).
        cfb-v4-005 is "engineered for PASS under the AKD hypothesis" — the
        single subject most remote from all others in key space. If even
        the high-AKD sentinel FAILS at canonical hparams, the AKD
        hypothesis is decisively weakened as a sufficient explanation.

  # ===========================================================================
  # AUTHORING NOTE — subject + template placeholders (operator-fill at lock)
  # ===========================================================================
  authoring_note: |
    Subjects and templates are intentionally left as <SUBJECT_00N> /
    <TEMPLATE_00N> placeholders in this v0.1 DRAFT. They are NOT runtime
    content; the load-bearing design decision is the high-AKD STRUCTURE
    (distinct domains + distinct templates + fixed targets), not the
    specific names. Per the operator-guidance register (S2.24 §9), final
    subject/template selection is a judgment call the operator ratifies at
    v0.1 → v1.0 lock. Recommended selection discipline for the fill:
      - Pick 5 subjects from FIVE different pretraining domains (e.g. a
        physicist, a composer, a river, a programming language, a mountain)
        so subject-last-token activations are maximally spread.
      - Deliberately AVOID subjects with strong musical associations
        (would leak the instrument target into target_true and contaminate
        the consistency readout — same trap cfb-v3 avoided).
      - Write 5 DISTINCT templates, each a category-noun completion frame
        that elicits an instrument (mirror the syntactic function of
        cfb-v3's "{} plays the instrument of" without reusing the string).
      - Re-confirm each (subject, template) pair pre-floods no target into
        the >0.05 ceiling at Cell 7 (high-freq guitar/piano are the risk).
    Cell A1 then EMPIRICALLY confirms the fill achieved high AKD before any
    edit is dispatched — so a poor subject/template choice is caught by the
    gate, not by a wasted edit.

  forward_routing:

    s225_obligations:
      - "[PENDING] Operator-fill <SUBJECT_00N> and <TEMPLATE_00N> at v0.1 close; record in v1.0 metadata."
      - "[PENDING] Cell 6: verify single-token property for all 5 target_new (identical to cfb-v3 targets, re-verified on 3B tokenizer); confirm harp → [4960,79] first-token-proxy."
      - "[PENDING] Cell 6: capture FRESH subject_last_token_id for all 5 (new subjects)."
      - "[PENDING] Cell A1 (pre-flight): compute AKD on BOTH cfb-v3 (predicted LOW) and cfb-v4 (predicted HIGH) at L2-L6; HARD gate that cfb-v4 > cfb-v3 by margin."
      - "[PENDING] Cell 7: capture pre-edit P(target_new) + natural top-1 (target_true) for all 5; verify acceptance bands."
      - "[PENDING] Lock cfb-v4-highAKD.yaml v0.1 → v1.0 at successful Cell 7 capture; record subject/template fills + AKD readout in v1.0 metadata."
      - "[PENDING] Author probe-set-v4-highAKD.yaml against locked v1.0 fact set (validation-contract-architect)."

    successor_routing:
      AKD_PASS_branch:
        - "cfb-v4 HIGH clears band (≥3/5) where cfb-v3 LOW failed 0/5 → ceiling localizes to corpus AKD. Route to v1.3 framework_finding amendment ('low-AKD-corpus ceiling, not model-invariant') + WS3 'well-separated keys' guidance. Then KnowEdit external-validity confirmation + base-vs-instruct control as separate sessions."
      AKD_FAIL_branch:
        - "cfb-v4 HIGH also fails 0/5 → AKD insufficient to explain ceiling. Route to per-layer sweep (Berkeley recipe; tests whether [2-6] is even the right band on 3B) + sequential-vs-joint dispatch axis (OQ-S224-LIT-1 items 3-4)."
      AKD_PARTIAL_branch:
        - "cfb-v4 HIGH partial (1-2 facts) → AKD contributing but not sufficient. Route to dispatch-mode axis (sequential vs joint) holding AKD high, to test batch-interference as the residual factor."

  open_questions:

    - id: "OQ-S225-AKD-1"
      origin: "S2.25 authoring (this corpus)"
      status: "Open — resolves at Cell A1"
      content: |
        Does cfb-v3 in fact measure as low-AKD at L2-L6 on Llama-3.2-3B?
        The entire seven-axis ceiling interpretation assumes the corpus was
        never a degenerate-key stress test. Cell A1 quantifies this for the
        first time. Predicted: cfb-v3 mean pairwise key distance near-0.

    - id: "OQ-S225-AKD-2"
      origin: "S2.25 authoring (this corpus)"
      status: "Open — resolves at Cell 13 verdict"
      content: |
        If cfb-v4 PASSES, is the PASS frequency-correlated (do high-freq
        guitar/piano clear more reliably than low-mid harp)? Mirrors the
        C.1-nested readout from cfb-v3. Informs whether AKD and target
        frequency interact.

    - id: "OQ-S225-TEMPLATE-CONFOUND-1"
      origin: "S2.25 authoring (this corpus)"
      status: "Open (disclosed confound; non-blocking on AKD verdict)"
      content: |
        cfb-v4 varies BOTH subject domain AND template, jointly raising
        AKD. A PASS cannot attribute the lift to subject-spread vs
        template-spread independently. This is acceptable for the
        first-pass model-family-vs-corpus discriminator (either way the
        ceiling is corpus-structural, not model-invariant), but a v5 could
        hold template fixed and vary only subject domain to disentangle.

