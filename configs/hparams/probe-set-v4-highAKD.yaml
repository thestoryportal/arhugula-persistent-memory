      are model-fact anchors and are re-baselined fresh on 3B but their
      EXPECTED top-1 (Paris/Jupiter/Au) is model-invariant.

    probe_count_summary:
      per_fact_consistency: 3
      per_fact_generalization: 3
      per_fact_unmount: 1
      per_fact_total: 7
      per_fact_count_facts: 5
      shared_specificity: 3
      total_active: 38                          # 5x7 + 3
      v3_carry_forward: 3                        # 3 shared spec only
      v4_re_authored: 35                         # 15 cons + 15 gen + 5 unmount

    acceptance_bands:
      consistency:
        criterion: "post-edit top-1 token equals target_new AND P(target_new) > 0.5"
        per_probe_predicate: "p_target_new_post > 0.5 AND top_1_post == target_new"
        provenance: "D-S211B-1 binding (original 0.5 band, carried verbatim)"
      generalization_locality:
        criterion: "pre-edit -> post-edit drift in top-1 probability is small (edit does not displace the subject's real facts)"
        per_probe_predicate: "abs(p_top_1_post - p_top_1_pre) < 0.05"
        provenance: "locality predicate (carried from v3); distinct from the runbook generalization-as-transfer predicate per D-S224-CALIB-1"
      specificity_shared:
        criterion: "pre-edit -> post-edit AND pre-edit -> post-unmount drift in top-1 probability is small"
