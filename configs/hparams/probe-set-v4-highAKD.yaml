        per_probe_predicate_post_unmount: "abs(p_top_1_postunmount - p_top_1_pre) < 0.05"
        provenance: "carried from v3 verbatim"
      unmount:
        criterion: "pre-edit -> post-unmount drift in P(target_true) at FP16 noise floor"
        per_probe_predicate: "abs(p_target_true_postunmount - p_target_true_pre) < 1e-4"
