# =============================================================================
# probe-set v4 (high-AKD) — paired with cfb-v4-highAKD.yaml v1.0
# =============================================================================
#
# Authored:        Session 2.25 authoring phase (2026-06-15)
# Authoring status: v1.0 — FULLY AUTHORED (all 38 probes written; no operator
#                   obligations). Pre-edit baselines capture pod-side at
#                   S2.26 Cell 7; probe TEXT is LOCKED.
# Specialist:      validation-contract-architect (primary; probe authorship)
#                  memit-specialist (consult; target-class verdict predicate)
#                  graph-data-architect (consult; subject biographical anchors)
# Paired corpus:   cfb-v4-highAKD.yaml v1.0
# Predecessor:     probe-set-v3.yaml v1.0 (structural template; consistency +
#                  unmount probes RE-AUTHORED against cfb-v4's 5 distinct
#                  templates; generalization probes RE-AUTHORED fresh because
#                  cfb-v4 subjects are entirely NEW — no carry-forward of the
#                  athlete biographical anchors; shared specificity probes
#                  carry forward UNCHANGED)
# Target model:    meta-llama/Llama-3.2-3B (fp16), pinned SHA
#                  13afe5124825b4f3751f836b40dafda64c1ed062
#
# =============================================================================
# DESIGN PHILOSOPHY (probe-set-v3 -> v4): preserve 38-probe structure;
# re-author 35, carry 3
# =============================================================================
#
#   probe-set-v3 used a 7-per-fact + 3-shared structure (3 cons + 3 gen + 1
#   unmount per fact; 3 shared spec) = 5x7 + 3 = 38 active. v4 PRESERVES this
#   structure verbatim — 38 active probes.
#
#   Re-authoring scope differs from v3 because cfb-v4 changed the SUBJECTS,
#   not just the prompt class:
#
#   - CONSISTENCY (3 per fact x 5 = 15): RE-AUTHORED. Each fact has its own
#     distinct template (cfb-v4's per-fact key-separation lever). The 3 cons
#     probes per fact are surface variations AROUND that fact's template,
#     testing edit robustness to phrasing without collapsing back toward a
#     single shared template (which would re-introduce the low-AKD condition
#     at the probe surface). Predicate unchanged: post-edit top-1 ==
#     target_new AND P(target_new) > 0.5 (D-S211B-1; original 0.5 band).
#
#   - GENERALIZATION (3 per fact x 5 = 15): RE-AUTHORED FRESH. v3's gen probes
#     were athlete biographical anchors (college, Heisman year, birth state).
#     cfb-v4's subjects are a physicist, a music theorist, a river, a
#     programming language, and a mountain — entirely new entities — so the
#     gen probes are authored fresh as well-known factual anchors for EACH
#     new subject, keyed to subject identity. Same role: test edit LOCALITY
#     (an instrument-fact edit must NOT displace the subject's real biography/
#     properties). Target-class-independent. Predicate unchanged: drift < 0.05.
#
#   - UNMOUNT (1 per fact x 5 = 5): RE-AUTHORED. The unmount probe is each
#     fact's own template (per IC-S23-4 — bit-exact restoration of pre-edit
#     P(top-1) at the edit prompt). cfb-v4 has 5 distinct templates, so the
#     5 unmount probes are the 5 distinct templates.
#
#   - SHARED SPECIFICITY (3): CARRY FORWARD UNCHANGED from v3 (geography /
#     astronomy / chemistry; orthogonal to any subject/target shift). These
#     are model-fact anchors, not subject-keyed, so they are valid on
#     Llama-3.2-3B exactly as on 8B (re-baselined at Cell 7).
#
#   Total: 35 re-authored (15 cons + 15 gen + 5 unmount) + 3 carry-forward.
#
# CALIBRATION DISCIPLINE (predicates carry forward verbatim from v3):
#   - consistency: post-edit top-1 == target_new AND P(target_new) > 0.5
#     (D-S211B-1 binding; original 0.5 band)
#   - generalization: abs(p_top_1_post - p_top_1_pre) < 0.05
#   - specificity: abs(p_top_1_post - p_top_1_pre) < 0.05 AND
#                  abs(p_top_1_postunmount - p_top_1_pre) < 0.05
#   - unmount: abs(p_target_true_postunmount - p_target_true_pre) < 1e-4
#     (HARD; IC-S23-4)
#   NOTE on generalization predicate: per D-S224-CALIB-1, the load-bearing
#   GENERALIZATION criterion for the FRAMEWORK FINDING is the runbook movement
#   predicate max(gen_p_target_new) > 0.3 (a transfer test), NOT the locality
#   drift < 0.05 here. The drift < 0.05 predicate in THIS file is a LOCALITY/
#   stability predicate (does the edit leave unrelated subject-facts intact),
#   which is its correct role. The two are not in conflict: locality lives
#   here on the gen probes; generalization-as-transfer lives in the runbook.
#   This file does NOT relabel its drift predicate as "generalization-as-
#   transfer" — it is locality, consistent with D-S224-CALIB-1's disposition.
#
#   Pre-edit baseline P(top-1) for each probe captured at S2.26 Cell 7. v3
#   baselines DO NOT carry forward (different model 3B-vs-8B AND different
#   subjects/templates).
#
# CALIBRATION-CONCERN FLAGS (v4-specific):
#   - The non-person subjects (river / language / mountain) may complete cons
#     probes to a domain noun rather than an instrument under some surface
#     variations. The substitution clauses in cfb-v4 §capture_obligations
#     cover this; Claude re-authors pod-side if Cell 7 surfaces it.
#   - cfb-v4-002 (Schenker, music-theorist): cons probes risk completing to a
#     theory term rather than an instrument. Flagged; substitution if needed.
#   - subject_last token position varies by template (some templates do not
#     end on the subject). This does NOT affect probe validity — cons/gen
#     probes evaluate the model's completion, and the MEMIT key (subject-last
#     activation) is captured at Cell P1 regardless of position. Noted so the
#     pod-side operator does not mistake it for an error.
# =============================================================================

probe_set_v4_highAKD:

  metadata:
    version: "4.0"
    authoring_status: "v1.0 — all 38 probe texts LOCKED; pre-edit baselines capture pod-side at S2.26 Cell 7"
    supersedes: null              # paired sibling of probe-set-v3, not a supersession
